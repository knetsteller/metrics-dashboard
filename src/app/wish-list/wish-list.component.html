<div *ngIf="wishes.length === 0 ; else showItems">
    There are no wishes to show
</div>

<ng-template #showItems>
    <ul *ngIf="items.length > 0" class="wish-list">
        <li *ngFor="let item of items">
            <div class="form-check">
                <label for="" class="form-check-label">
                    <input type="checkbox" class="checkbox" [checked]="item.isComplete" (click)="toggleItem(item)">
                    {{item.wishText}}
                </label>
            </div>
        </li>
    </ul>
</ng-template>
