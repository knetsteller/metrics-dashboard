<div class="container">
  <nav class="mb-3">
    <a routerLink="/welcome" class="btn btn-secondary">Ir para Welcome</a>
  </nav>

  <div *ngIf="showDashboard">
    <form class="row mt-3 gx-3 gy-2 align-items-center justify-content-center">
      <div class="col-sm-6">
        <label for="specificSizeInputName" class="visually-hidden">wish</label>
        <input type="text" class="form-control" />
      </div>
      <div class="col-auto">
        <button
          class="btn btn-primary"
          (click)="$event.preventDefault(); addNewWish()"
        >
          Add wish
        </button>
      </div>
    </form>

    <div class="row mt-3">
      <app-dashboard></app-dashboard>
    </div>
  </div>

  <router-outlet></router-outlet>
</div>
